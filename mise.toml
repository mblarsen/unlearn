[tools]
go = "1.26.3"
pre-commit = "latest"
"go:golang.org/x/tools/cmd/goimports" = "latest"
"aqua:trufflesecurity/trufflehog" = "3.88.29"
"pipx:commitizen" = "4.16.2"
goreleaser = "2.15.4"

[tasks.setup]
description = "Install project tooling and git hooks"
run = "mise install && pre-commit install --install-hooks --hook-type pre-commit --hook-type commit-msg"

[tasks.check]
description = "Run all pre-commit checks"
run = "pre-commit run --all-files"

[tasks.build]
description = "Build the unlearn CLI"
run = "go build -o unlearn ."

[tasks.tidy]
description = "Tidy Go module dependencies"
run = "go mod tidy"

[tasks.goreleaser-check]
description = "Validate the GoReleaser configuration"
depends = ["tidy"]
run = "goreleaser check"

[tasks.release-snapshot]
description = "Build a local GoReleaser snapshot"
depends = ["tidy"]
run = "goreleaser release --snapshot --clean"

[tasks.release-build]
description = "Package a tagged GoReleaser build without uploading"
depends = ["tidy"]
run = "goreleaser release --clean --skip=publish"

[tasks.release]
description = "Package and upload a tagged GoReleaser release to GitHub"
depends = ["tidy"]
run = "goreleaser release --clean"

[tasks.fmt]
description = "Format Go files"
run = "goimports -w ."
